<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte Créativité — Aperçu</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
    }

    .duo-card-creat {
      background: linear-gradient(160deg, #faf5ff, #ede9fe, #ddd6fe);
      border-radius: 32px;
      padding: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(139,92,246,0.2);
      width: 340px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .duo-card-creat:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(139,92,246,0.3);
    }

    /* Label */
    .duo-card-top {
      padding: 28px 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .duo-label-creat {
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #ede9fe;
      color: #6b21a8;
      padding: 5px 14px;
      border-radius: 50px;
    }

    /* Titre */
    .creat-titre {
      font-size: 1.35rem;
      font-weight: 900;
      color: #3b0764;
      text-align: center;
    }

    /* Image pleine carte */
    .duo-img-creat {
      width: 100%;
      flex: 1;
      overflow: hidden;
    }
    .duo-img-creat img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Citation */
    .creat-citation {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: #6b21a8;
      text-align: center;
      line-height: 1.6;
      padding: 12px 28px 20px;
      border-top: 1px solid rgba(139,92,246,0.15);
      margin-top: 8px;
    }

    /* Bouton */
    .duo-btn-creat {
      display: block;
      width: 100%;
      padding: 16px 32px;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      text-decoration: none;
      text-align: center;
      letter-spacing: 0.02em;
      transition: 0.25s ease;
    }
    .duo-btn-creat:hover {
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      box-shadow: 0 10px 28px rgba(109,40,217,0.4);
    }
  </style>
</head>
<body>

  <div class="duo-card-creat">

    <div class="duo-card-top">
      <div class="duo-label-creat">🎨 Arts plastiques</div>
      <h2 class="creat-titre"><em>« La créativité, c'est l'intelligence qui s'amuse »</em></h2>
    </div>

    <div class="duo-img-creat">
      <img src="creat-logo.png" alt="Créativité" />
    </div>

    <a href="#" class="duo-btn-creat">Découvrir →</a>

  </div>

</body>
</html>
